# Lazy init: DataSource and JPA start on first use so the app window shows quickly
spring.main.lazy-initialization=true

# DB connection: set false to skip (faster startup).
#   • Command line: -Dapp.db.enabled=false
#   • Profile: -Dspring.profiles.active=nodb
app.db.enabled=false

spring.datasource.url=jdbc:postgresql://ep-red-dust-alm563et-pooler.c-3.eu-central-1.aws.neon.tech/CodEdu?sslmode=require

spring.datasource.username=neondb_owner
spring.datasource.password=npg_pkNJZtV2T7Rf
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool: minimal at startup so first connection is fast when needed
spring.datasource.hikari.minimum-idle=0
